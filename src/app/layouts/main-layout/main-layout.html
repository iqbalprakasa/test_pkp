<div class="flex flex-col min-h-screen bg-slate-50 font-sans text-slate-800">
  
  <header class="flex items-center justify-between bg-slate-900 px-6 h-16 shadow-md z-10 sticky top-0">
    <div class="flex items-center gap-3">
      <div class="bg-indigo-600 p-2 rounded-lg text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
      </div>
      <span class="font-bold text-lg text-white tracking-wider">Aplikasi<span class="text-indigo-400"> Test PKP</span></span>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-semibold text-slate-200">{{this.userData.firstName}}</p>
        <p class="text-xs text-slate-400">{{this.userData.email}}</p>
      </div>
      <button (click)="logout()" class="flex items-center gap-2 bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-200 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        <span>Logout</span>
      </button>
    </div>
  </header>

  <div class="flex flex-1">
    <aside class="w-64 bg-slate-950 text-slate-400 p-4 flex flex-col justify-between hidden md:flex min-h-[calc(100vh-4rem)]">
      <div class="space-y-6">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-3">Menu Utama</p>
        <nav class="space-y-1">
          <a routerLink="/products" routerLinkActive="bg-indigo-600 text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-all group font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
            <span>Produk</span>
          </a>
        </nav>
      </div>
      <div class="text-xs text-slate-600 text-center border-t border-slate-900 pt-4">
        v1.0.0 (Stable)
      </div>
    </aside>

    <main class="flex-1 p-6 md:p-8 bg-slate-50 overflow-y-auto">
      <router-outlet />
    </main>
  </div>

  <footer class="bg-white border-t border-slate-200 py-3 text-center text-xs text-slate-500">
    &copy; 2026 CareIn Project. All rights reserved.
  </footer>

</div>
